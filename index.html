<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYB Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 1rem; margin-bottom: 60px; }
    .games { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .game-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 260px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }
    .game-card:hover { border-color: #555; }
    .game-icon {
      margin-bottom: 16px;
    }
    .game-icon img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
    }
    .game-card h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .game-card p { color: #888; font-size: 0.9rem; line-height: 1.5; }
    .badge {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.75rem;
      color: #aaa;
      background: #252525;
      padding: 4px 10px;
      border-radius: 20px;
    }
    footer { margin-top: 80px; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>CYB Games</h1>
  <p class="subtitle">Independent game studio</p>

  <div class="games">
    <a class="game-card" href="/mitaine/">
      <div class="game-icon"><img src="/mitaine-icon.png" alt="Mitaine icon"></div>
      <h2>Mitaine</h2>
      <p>A traditional Quebec card game for four players. Play with and against three AI opponents.</p>
      <span class="badge">iPhone · Card Game</span>
    </a>
  </div>

  <footer>&copy; 2026 CYB Games</footer>
</body>
</html>
